name: dbt CI

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check YAML formatting
        run: |
          find . -name "*.yml" -o -name "*.yaml"

      - name: Validate project structure
        run: |
          test -f dbt_project.yml

      - name: Validate YAML
        run: |
          pip install yamllint
          yamllint .

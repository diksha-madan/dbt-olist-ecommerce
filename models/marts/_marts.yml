version: 2

models:

  - name: mart_customer_360
    description: >
      Customer-centric mart containing aggregated customer purchase,
      revenue and satisfaction metrics. One row per customer.

    columns:
      - name: customer_id
        description: Unique identifier for the customer.
        tests:
          - unique
          - not_null

      - name: total_orders
        description: Total number of orders placed by the customer.

      - name: total_revenue
        description: Total revenue generated by the customer.

      - name: avg_order_value
        description: Average order value for the customer.

      - name: avg_review_score
        description: Average review score across all customer orders.

      - name: first_order_date
        description: Date of the customer's first purchase.

      - name: last_order_date
        description: Date of the customer's most recent purchase.

      - name: customer_tenure_days
        description: Number of days since the customer's first purchase.


  - name: mart_product_performance
    description: >
      Product performance mart containing sales, revenue and product
      performance metrics. One row per product.

    columns:
      - name: product_id
        description: Unique identifier for the product.
        tests:
          - unique
          - not_null

      - name: total_items_sold
        description: Total quantity sold for the product.

      - name: total_revenue
        description: Total revenue generated by the product.

      - name: avg_price
        description: Average selling price of the product.

      - name: is_sold
        description: Indicates whether the product has ever been sold.
        tests:
        - accepted_values:
            arguments:
              values: [true, false]


  - name: mart_seller_performance
    description: >
      Seller performance mart containing sales, revenue and customer
      satisfaction metrics. One row per seller.

    columns:
      - name: seller_id
        description: Unique identifier for the seller.
        tests:
          - unique
          - not_null

      - name: seller_city
        description: Seller city.

      - name: seller_state
        description: Seller state.

      - name: total_orders
        description: Total number of orders fulfilled by the seller.

      - name: distinct_products_sold
        description: Number of distinct products sold by the seller.

      - name: total_items_sold
        description: Total quantity of items sold by the seller.

      - name: total_revenue
        description: Total revenue generated by the seller.

      - name: avg_selling_price
        description: Average selling price of products sold by the seller.

      - name: avg_review_score
        description: Average review score for orders fulfilled by the seller.

      - name: has_sales
        description: Indicates whether the seller has recorded any sales.
        tests:
        - accepted_values:
            arguments:
              values: [true, false]


  - name: mart_revenue
    description: >
      Revenue mart containing daily business performance metrics.
      One row per purchase date.

    columns:
      - name: order_date
        description: Order purchase date.
        tests:
          - unique
          - not_null

      - name: total_orders
        description: Total number of orders placed on the date.

      - name: total_customers
        description: Total distinct customers placing orders on the date.

      - name: revenue
        description: Total revenue generated on the date.

      - name: average_order_value
        description: Average order value for the date.

      - name: delayed_order_pct
        description: Percentage of delayed orders for the date.
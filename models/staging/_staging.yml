version: 2

models:
  - name: stg_orders
    columns:
      - name: order_id
        tests: 
          - unique
          - not_null

      - name: customer_id
        tests:
          - not_null
          - relationships:
              field: customer_id
              to: ref('stg_customers')

  - name: stg_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

      - name: customer_unique_id
        tests:
          - not_null
      - name: customer_zip_code



  - name: stg_order_items
    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              field: order_id
              to: ref('stg_orders')
      - name: order_item_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
          - relationships:
              field: product_id
              to: ref('stg_products')
      - name: seller_id
        tests:
          - not_null
          - relationships:
              field: seller_id
              to: ref('stg_sellers')
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ['order_id', 'order_item_id']


  - name: stg_payments
    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              field: order_id
              to: ref('stg_orders')
      - name: payment_sequential
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ['order_id', 'payment_sequential']


  - name: stg_products
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: stg_reviews
    columns:
      - name: review_id
        tests:
          - unique
          - not_null
      - name: order_id
        tests:
          - not_null
          - relationships:
              field: order_id
              to: ref('stg_orders')


  - name: stg_sellers
    columns:
      - name: seller_id
        tests:
          - unique
          - not_null
      - name: seller_zip_code
        


  - name: stg_geolocation
    columns:
      - name: geolocation_zip_code
        tests:
          - not_null